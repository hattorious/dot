---
- defaults:
    link:
      relink: true

- clean:
    - "~"
    - "~/.claude/*"
    - "~/.config"

- link:
    ~/.bash_completion: bash/complete.bash
    ~/.bash_profile: bash/profile.bash
    ~/.bash_prompt: bash/prompt.bash
    ~/.bashrc: bash/runcom.bash
    ~/.bashrc.post: bash/runcom.post.bash
    ~/.claude:
      glob: true
      path: claude/**
      force: true
    ~/.config/bat/themes:
      path: bat/themes/
      create: true
    ~/.config/lazygit/config.yml:
      path: lazygit/config.yml
      create: true
    ~/.config/ghostty:
      glob: true
      path: ghostty/**
      create: true
    ~/.config/starship.toml: config/starship/starship.toml
    ~/.config/yamllint/config:
      path: config/yamllint/config.yaml
      create: true
    ~/.config/zed:
      glob: true
      path: zed/**
      create: true
    ~/.ctags.d: ctags/
    ~/.dotfiles: ""
    ~/.gitcommittemplate: git/commit_template.txt
    ~/.gitconfig: git/gitconfig
    ~/.gitignore_global: git/ignore_global
    # ~/.gnupg/gpg-agent.conf: gpg/gpg-agent.conf
    # ~/.gnupg/gpg.conf: gpg/gpg.conf
    ~/.ssh: ssh/
    ~/.terraform.d/plugin-cache:
      path: terraform/plugin-cache/
      create: true
    ~/.terraformrc: terraform/runcom
    ~/.tmux.conf: tmux/tmux.conf
    ~/.tmuxp: tmuxp
    ~/.vim_runtime: vim/vim_runtime/
    ~/.vimrc: vim/runcom.vim
    ~/.zshrc: zsh/runcom.zsh
    ~/.zimrc: zsh/zim/zimrc

- create:
    - ~/.zsh/cache

- shell:
    - [git submodule update --init --recursive, Installing submodules]

- mcp:
    env: mcp/.env
    local: mcp/mcp.local.yaml
    servers:
      shortcut:
        command: npx
        args: ["-y", "@shortcut/mcp@latest"]
        env:
          SHORTCUT_API_TOKEN: SHORTCUT_API_TOKEN
        tools: [claude-desktop, cursor]

      terraform:
        command: docker
        args: ["run", "-i", "--rm", "hashicorp/terraform-mcp-server:0.4.0"]
        tools: [claude-desktop, cursor]

      github:
        command: docker
        args: ["run", "-i", "--rm", "-e", "GITHUB_PERSONAL_ACCESS_TOKEN", "ghcr.io/github/github-mcp-server"]
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: GITHUB_PERSONAL_ACCESS_TOKEN
        tools: [claude-desktop]

      google-cloud-toolbox:
        command: /opt/homebrew/bin/toolbox
        args: ["--prebuilt", "bigquery,cloud-sql-postgres-admin,dataplex", "--stdio"]
        env:
          BIGQUERY_PROJECT: BIGQUERY_PROJECT
          DATAPLEX_PROJECT: DATAPLEX_PROJECT
        tools: [claude-desktop]

      private-journal:
        command: npx
        args: ["github:obra/private-journal-mcp"]
        tools: [claude-desktop]

      basic-memory:
        command: uvx
        args: ["basic-memory", "mcp"]
        tools: [claude-desktop]

      circleci:
        command: npx
        args: ["-y", "@circleci/mcp-server-circleci"]
        env:
          CIRCLECI_TOKEN: CIRCLECI_TOKEN
        tools: [cursor]

      prefect:
        command: uvx
        args: ["--from", "prefect-mcp", "prefect-mcp-server"]
        tools: [cursor]
