repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: Lint Python (ruff)
        language: system
        entry: uv run ruff check --fix
        types: [python]
      - id: ruff-format
        name: Format Python (ruff)
        language: system
        entry: uv run ruff format
        types: [python]
      - id: sort-json
        name: Sort JSON keys
        language: system
        entry: uv run scripts/sort_json.py
        types: [json]
        exclude: |
          (?x)^(
            vim/vim_runtime/plugins/|
            tmp/|
            dotbot/
          )
